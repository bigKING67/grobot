name: core-packaging-check

on:
  pull_request:
    paths:
      - "packages/cli/**"
      - "packages/core-*/**"
      - "scripts/install-core-binary.sh"
      - "scripts/install-core-from-url.sh"
      - "scripts/core-generate-manifest.sh"
      - "scripts/core-stage-artifacts.sh"
      - "scripts/core-status.sh"
      - "scripts/core-verify-packages.sh"
      - "scripts/core-release-gate.sh"
      - "scripts/lib/**"
      - "gateway/src/extensions/contracts/runtime-tool-*.ts"
      - "scripts/check-runtime-tool-contracts.mjs"
      - "scripts/test-runtime-tool-contracts-json-schema.mjs"
      - "scripts/test-runtime-tool-quality-report-module.mjs"
      - "scripts/test-runtime-tool-quality-registry-parity.mjs"
      - "scripts/test-runtime-tool-release-report.mjs"
      - "shared/contracts/runtime-tool-quality-v1.json"
      - "scripts/core-release-prepare.sh"
      - "package.json"
      - "grobot"
      - "README.md"
      - ".github/workflows/core-packaging-check.yml"
  push:
    branches:
      - main
    paths:
      - "packages/cli/**"
      - "packages/core-*/**"
      - "scripts/install-core-binary.sh"
      - "scripts/install-core-from-url.sh"
      - "scripts/core-generate-manifest.sh"
      - "scripts/core-stage-artifacts.sh"
      - "scripts/core-status.sh"
      - "scripts/core-verify-packages.sh"
      - "scripts/core-release-gate.sh"
      - "scripts/lib/**"
      - "gateway/src/extensions/contracts/runtime-tool-*.ts"
      - "scripts/check-runtime-tool-contracts.mjs"
      - "scripts/test-runtime-tool-contracts-json-schema.mjs"
      - "scripts/test-runtime-tool-quality-report-module.mjs"
      - "scripts/test-runtime-tool-quality-registry-parity.mjs"
      - "scripts/test-runtime-tool-release-report.mjs"
      - "shared/contracts/runtime-tool-quality-v1.json"
      - "scripts/core-release-prepare.sh"
      - "package.json"
      - "grobot"
      - "README.md"
      - ".github/workflows/core-packaging-check.yml"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Show runtime versions
        run: |
          node --version
          npm --version
          cargo --version

      - name: Validate shell scripts syntax
        run: |
          bash -n packages/cli/bin/grobot
          bash -n scripts/install-core-binary.sh
          bash -n scripts/install-core-from-url.sh
          bash -n scripts/core-generate-manifest.sh
          bash -n scripts/core-stage-artifacts.sh
          bash -n scripts/core-status.sh
          bash -n scripts/core-verify-packages.sh
          bash -n scripts/core-release-gate.sh
          bash -n scripts/core-release-prepare.sh

      - name: Verify core packages (dev mode allows stubs)
        run: npm run core:verify:packages -- --allow-stub

      - name: Validate runtime tool JSON schema
        run: npm run check:gateway:runtime-tools:schema

      - name: Validate runtime tool quality report module
        run: npm run check:gateway:runtime-tools:quality-report

      - name: Validate runtime tool quality resolver parity
        run: npm run check:gateway:runtime-tools:quality-parity

      - name: Validate runtime tool release failure report
        run: npm run check:gateway:runtime-tools:release-report

      - name: Run core release gate in dev mode
        run: npm run core:gate:release -- --allow-stub --report /tmp/core-release-gate-report.dev.json

      - name: Print core status (JSON)
        run: npm run core:status -- --json

      - name: Upload core packaging reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-packaging-reports
          path: |
            /tmp/core-release-gate-report.dev.json
