schema_version = 1
mode = "mvp"

[agent]
id = "grobot"
name = "Grobot Coding Agent"
description = "TypeScript gateway plus Rust runtime agent platform"

[channels]
enabled = ["feishu", "telegram"]
reply_mode = "stream"

[session]
key_format = "<platform>:<tenant>:<scope>:<subject>"
share_session_in_channel = false
thread_isolation = true
reply_in_thread = true
resume_ttl_secs = 1800
heartbeat_secs = 15

[gateway]
ingress = "webhook"
orchestrator = "typescript"

[gateway.management]
enabled = true
bind = "127.0.0.1:8080"

[execution]
gateway_impl = "ts"
runtime_impl = "rust"
shadow_mode = false

[context_engine]
enabled = true
profile = "balanced" # balanced | aggressive | conservative
context_window_tokens = 128000
reserved_output_tokens = 20000
safety_margin_tokens = 3000
proactive_ratio = 0.88
forced_ratio = 0.93
hard_ratio = 0.97
reactive_max_retries = 1
ptl_max_retries = 3
circuit_breaker_failures = 3
reactive_on_prompt_too_long = true
lineage_enabled = true
lineage_max_rows = 3
lineage_max_commits = 120
lineage_cache_ttl_ms = 30000
workspace_signals_enabled = true
workspace_signals_max_rows = 4
workspace_signals_include_untracked = true
workspace_signals_cache_ttl_ms = 2000
dependency_graph_enabled = true
dependency_graph_max_rows = 4
symbol_graph_enabled = true
symbol_graph_max_rows = 4
semantic_prefetch_enabled = false
semantic_prefetch_timeout_ms = 2500
semantic_prefetch_max_evidence = 6

[cc_connect]
config_file = ".grobot/config.toml"
config_template = ".grobot/config.toml.example"

[runtime]
engine = "rust"
target_concurrency = 100
workers_per_node = 16
active_turn_soft_limit = 60
turn_timeout_secs = 180
session_sticky_ttl_secs = 300

[runtime.queue]
provider = "redis_stream"
retry_backoff_ms = 500

[runtime.storage]
hot_cache = "redis"
durable_state = "postgres"

[provider_routing]
default_group = "balanced"
fallback_order = ["gpt-5.4", "kimi-2.5", "openai-compatible"]

[[provider_routing.groups]]
name = "balanced"
model_class = "reasoning"

[[provider_routing.groups.targets]]
provider = "kimi"
weight = 70

[[provider_routing.groups.targets]]
provider = "openai_compatible"
weight = 30

[tools]
allow = ["list", "glob", "search", "read", "write", "edit", "shell", "git", "rg", "python3", "cargo", "npm"]
deny = ["git reset --hard", "git push --force", "rm -rf /"]

[mcp.instructions]
enabled = true
scope = "project_first" # project_first | project_only | global_only
strict = false

[search.routing]
kimi = "mcp_first_fallback_builtin" # mcp_first_fallback_builtin | builtin_only | mcp_only

[statusline]
enabled = true
layout_mode = "adaptive" # adaptive | full | compact
theme = "plain" # plain | nerd_font
separator = " · "
segment_order = ["model", "project", "context", "tokens", "session"]
warning_threshold_percent = 80
critical_threshold_percent = 90
budget_snapshot_cache_ttl_ms = 2500
session_topic_cache_ttl_ms = 1500
session_topic_max_width = 42

[statusline.segments]
model = true
project = true
context = true
tokens = true
session = true

[experience.scheduler]
enabled = false
interval_secs = 120
tasks_dir = ".grobot/scheduler/tasks"
done_dir = ".grobot/scheduler/done"
log_path = ".grobot/scheduler/scheduler.log"
default_max_delay_hours = 6

[hooks]
enabled = true
strict = false
timeout_secs = 5

[memory]
allow_org_shared_read = false

[memory.wiki]
allow_org_shared_read = false

[memory.v1]
enabled = true
default_scope = "auto"
write_mode = "review_first"

[memory.v1.retrieval]
max_items = 8
max_chars = 220
min_score = 2.0
recency_half_life_days = 30

[memory.v1.privacy]
allow_org_shared_read = false

[memory.v1.lifecycle]
enabled = true
promote_after_days = 7
promote_min_strength = 0.82
decay_after_days = 21
decay_factor = 0.85
decay_min_importance = 0.25
decay_interval_days = 7
archive_after_days = 90
archive_max_strength = 0.45
batch_limit = 500

[wiki]
enabled = true
default_scope = "auto"
allow_org_shared_read = false

[wiki.retrieval]
max_files = 80
max_chars = 320
max_items = 4

[wiki.lint]
stale_days = 30
max_files = 300

[wiki.review]
write_mode = "review_first"

[skills.router]
enabled = true
score_threshold = 2.0
min_score_gap = 0.8

[skills.runtime]
max_descriptors = 64
descriptor_scan_lines = 180
max_skill_block_chars = 14000

[skills.observability]
enabled = true
path = "logs/skills-router.jsonl"

[safety]
require_confirm = ["destructive_git", "db_schema_change", "prod_api_write"]

[observability]
trace_enabled = true
metrics = ["latency_p95_ms", "queue_depth", "tool_error_rate", "session_success_rate"]
