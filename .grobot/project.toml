schema_version = 1
mode = "mvp"

[agent]
id = "grobot"
name = "Grobot Coding Agent"
description = "TypeScript gateway plus Rust runtime agent platform"

[channels]
enabled = ["feishu", "telegram"]
reply_mode = "stream"

[session]
key_format = "<platform>:<tenant>:<scope>:<subject>"
share_session_in_channel = false
thread_isolation = true
reply_in_thread = true
resume_ttl_secs = 1800
heartbeat_secs = 15

[gateway]
ingress = "webhook"
orchestrator = "typescript"

[gateway.management]
enabled = true
bind = "127.0.0.1:8080"

[execution]
gateway_impl = "ts"
runtime_impl = "rust"
shadow_mode = false

[cc_connect]
config_file = ".grobot/config.toml"
config_template = ".grobot/config.toml.example"

[runtime]
engine = "rust"
target_concurrency = 100
workers_per_node = 16
active_turn_soft_limit = 60
turn_timeout_secs = 180
session_sticky_ttl_secs = 300

[runtime.queue]
provider = "redis_stream"
retry_backoff_ms = 500

[runtime.storage]
hot_cache = "redis"
durable_state = "postgres"

[provider_routing]
default_group = "balanced"
fallback_order = ["gpt-5.4", "kimi-2.5", "openai-compatible"]

[[provider_routing.groups]]
name = "balanced"
model_class = "reasoning"

[[provider_routing.groups.targets]]
provider = "kimi"
weight = 70

[[provider_routing.groups.targets]]
provider = "openai_compatible"
weight = 30

[tools]
allow = ["list", "glob", "search", "read", "write", "edit", "shell", "git", "rg", "python3", "cargo", "npm"]
deny = ["git reset --hard", "git push --force", "rm -rf /"]

[hooks]
enabled = true
strict = false
timeout_secs = 5

[memory]
allow_org_shared_read = false

[memory.wiki]
allow_org_shared_read = false

[memory.v1]
enabled = true
default_scope = "auto"
write_mode = "review_first"

[memory.v1.retrieval]
max_items = 8
max_chars = 220
min_score = 2.0
recency_half_life_days = 30

[memory.v1.privacy]
allow_org_shared_read = false

[memory.v1.lifecycle]
enabled = true
promote_after_days = 7
promote_min_strength = 0.82
decay_after_days = 21
decay_factor = 0.85
decay_min_importance = 0.25
decay_interval_days = 7
archive_after_days = 90
archive_max_strength = 0.45
batch_limit = 500

[wiki]
enabled = true
default_scope = "auto"
allow_org_shared_read = false

[wiki.retrieval]
max_files = 80
max_chars = 320
max_items = 4

[wiki.lint]
stale_days = 30
max_files = 300

[wiki.review]
write_mode = "review_first"

[skills.router]
enabled = true
score_threshold = 2.0
min_score_gap = 0.8

[skills.runtime]
max_descriptors = 64
descriptor_scan_lines = 180
max_skill_block_chars = 14000

[skills.observability]
enabled = true
path = "logs/skills-router.jsonl"

[safety]
require_confirm = ["destructive_git", "db_schema_change", "prod_api_write"]

[observability]
trace_enabled = true
metrics = ["latency_p95_ms", "queue_depth", "tool_error_rate", "session_success_rate"]
