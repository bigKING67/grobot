GROK_API_KEY = "sixseven"
GROK_API_URL = "https://grok2api.52671314.xyz/v1"
TAVILY_API_KEY = "mcp_c939473f8953.d86a66667d8c7f26cf03d7bbfd70ee1ba3ad1f5b1ea474eb"
